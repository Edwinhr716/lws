apiVersion: v1
kind: ServiceAccount
metadata:
  name: lws-sidecar-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lws-sidecar-role
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["leaderworkerset.x-k8s.io"]
  resources: ["leaderworkersets"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lws-sidecar-rolebinding
subjects:
- kind: ServiceAccount
  name: lws-sidecar-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: lws-sidecar-role
  apiGroup: rbac.authorization.k8s.io
